# Static Squid configuration. The user-managed allowlist lives outside this
# repo at ~/.config/devcontainer-egress/allowlist.txt and is mounted into the
# container at /etc/squid/allowlist.txt by compose.yml.

http_port 3128

acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access deny all

cache deny all

# Tail with: egress logs
access_log /var/log/squid/access.log squid
